<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>修改密码 - Xray 节点检测系统</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="page">
    <header class="header modern">
      <div class="brand-block">
        <div class="brand-pill">XRAY NODE TESTER</div>
        <h1>修改密码</h1>
        <div class="sub">为安全起见，修改后需重新登录</div>
      </div>
      <div class="status modern">
        <div class="header-actions">
          <a class="btn" href="/">返回首页</a>
          <form method="post" action="/api/logout" class="inline">
            <button type="submit" class="ghost">退出登录</button>
          </form>
        </div>
      </div>
    </header>

    <section class="card">
      <form id="password-form">
        <label>当前密码</label>
        <input type="password" id="old-password" placeholder="请输入当前密码" required />
        <label>新密码</label>
        <input type="password" id="new-password" placeholder="至少 6 位" required />
        <label>确认新密码</label>
        <input type="password" id="confirm-password" placeholder="再次输入新密码" required />
        <button type="submit">保存密码</button>
      </form>
      <div class="hint" id="password-result"></div>
    </section>
  </div>

<script src="/static/app.js"></script>
</body>
</html>
