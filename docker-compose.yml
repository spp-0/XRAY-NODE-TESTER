version: "3.9"
services:
  xray-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xray-web
    ports:
      - "8088:8088"
    volumes:
      - ./data:/data/xray1
    environment:
      - XRAY_WEB_DATA_DIR=/data/xray1
      - XRAY_BIN=/data/xray1/xray
      - XRAY_TEST_URL=https://www.google.com/generate_204
      - XRAY_TEST_WORKERS=8
      - XRAY_TEST_TIMEOUT=6
      - XRAY_ADMIN_USER=admin
      - XRAY_ADMIN_PASS=admin123
      - XRAY_AUTH_SALT=xray-web
      - XRAY_LOGIN_MAX_ATTEMPTS=5
      - XRAY_LOGIN_WINDOW_MIN=10
      - XRAY_LOGIN_LOCK_MIN=15
      - XRAY_AUTO_CHECK_INTERVAL=30
      # 可选：手动指定 xray 下载地址（否则自动从最新 release 获取）
      # - XRAY_DOWNLOAD_URL=https://github.com/XTLS/Xray-core/releases/download/v1.x.x/Xray-linux-64.zip
    restart: unless-stopped
